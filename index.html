<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atomic Wind Field</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script src="script.js"></script>
</head>
<body>

<div id="overlay">
  <div id="panel">
    <div id="title">ATOMIC WIND FIELD</div>
    <div id="subtitle">Electron Flow Simulation</div>

    <div id="info">
      滑鼠 = 改變電場方向<br>
      左鍵 = 放置原子核（障礙物）<br>
      R = 重置原子結構<br>
      電子會在電場中形成流動軌跡
    </div>

    <button id="startBtn">ENTER FIELD</button>
  </div>
</div>

</body>
</html>
